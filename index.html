<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Колесо баланса</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Очки -->
    <div id="score">0</div>

    <!-- Переключение колес -->
    <div class="wheel-switcher">
        <select id="wheelSelect"></select>
        <button id="addWheel">+</button>
        <button id="deleteWheel">🗑</button>
    </div>

    <input id="wheelName">

    <!-- Колесо -->
    <div class="wheel-wrapper">
        <canvas id="wheel"></canvas>
        <div id="labels"></div>
    </div>

    <!-- Контролы -->
    <div id="controls"></div>

    <!-- Декор -->
    <button id="decorBtn">🎨 Декор</button>

    <div id="decorModal" class="modal hidden">
        <div class="modal-content">
            <span id="closeModal" class="modal-close">✖</span>
            <p>Скоро...</p>
        </div>
    </div>

    <!-- Задачи -->
    <button id="toggleTasks">📋 Задачи</button>

    <div id="tasksBlock" class="tasks hidden">
        <div class="task-input">
            <input id="taskInput" placeholder="Введите задачу...">
            <button id="addTask">+</button>
        </div>
        <div id="taskList"></div>
    </div>

</div>

<script type="module" src="main.js"></script>
</body>
</html>
